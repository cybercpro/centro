<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Servicios y Tarifas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("fondo.jpg");
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0d1b2a;
            padding: 3rem 0;
            overflow-x: hidden;
        }

        /* Títulos con sombra negra fuerte para que resalten sobre el fondo claro del cielo */
        .titulo-catalogo {
            color: #00b4d8;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0 0 15px rgba(0, 180, 216, 0.6);
        }
        .subtitulo-catalogo {
            color: #ffffff !important;
            font-weight: 600;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 1), 1px 1px 3px rgba(0, 0, 0, 1);
            font-size: 1.15rem;
        }

        /* Estilo de las tarjetas de servicios */
        .servicio-card {
            background: rgba(0, 0, 0, 0.85); /* Fondo oscuro interno para que resalten las letras */
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .servicio-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 180, 216, 0.5);
            border-color: #00b4d8;
        }

        /* BOTÓN DE CERRAR ROJO SÓLIDO */
        .btn-cerrar-cyber {
            background-color: #dc3545 !important;
            color: #ffffff !important;
            border: 2px solid #ffffff !important;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
            transition: all 0.2s ease-in-out;
        }
        .btn-cerrar-cyber:hover {
            background-color: #bd2130 !important;
            box-shadow: 0 8px 22px rgba(220, 53, 69, 0.7);
            transform: scale(1.05);
        }

        /* Muñequito robot en blanco brillante */
        #cyber-avatar {
            position: fixed;
            top: 0;
            left: 0;
            font-size: 30px;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            animation: caminar 0.6s infinite alternate ease-in-out;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
        }
        @keyframes caminar {
            0% { transform: translateY(0) rotate(-6deg); }
            100% { transform: translateY(-6px) rotate(6deg); }
        }
    </style>
</head>
<body class="bg-dark text-light">

    <div id="cyber-avatar">
        <i class="bi bi-robot"></i>
    </div>

    <div class="container text-center my-5 py-2">
        <div class="fs-1 text-info mb-2" style="text-shadow: 0 0 15px rgba(0,180,216,0.6);">
            <i class="bi bi-tags-fill"></i>
        </div>
        <h1 class="display-4 fw-bold titulo-catalogo">Catálogo de Servicios Oficial</h1>
        <p class="subtitulo-catalogo">Precios actualizados en tiempo real para nuestros clientes.</p>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center g-4">
            
            <div class="col-md-5 col-lg-4">
                <div class="servicio-card p-4 h-100 d-flex flex-column justify-content-between text-center">
                    <div>
                        <div class="fs-1 text-info mb-3"><i class="bi bi-clock-history"></i></div>
                        <h3 class="fw-bold text-white mb-3">Uso de PC / Internet</h3>
                        <p class="text-light fs-6 fw-normal mb-4">Computadoras rápidas con internet de fibra óptica para tareas, juegos o navegación libre.</p>
                    </div>
                    <div>
                        <button class="btn btn-dark w-100 py-2 border-secondary fw-bold text-info fs-5">$1.00 / Hora</button>
                    </div>
                </div>
            </div>

            <div class="col-md-5 col-lg-4">
                <div class="servicio-card p-4 h-100 d-flex flex-column justify-content-between text-center">
                    <div>
                        <div class="fs-1 text-info mb-3"><i class="bi bi-files"></i></div>
                        <h3 class="fw-bold text-white mb-3">Copias</h3>
                        <p class="text-light fs-6 fw-normal mb-4">Copias nítidas de alta calidad en blanco y negro o a color. Tamaños Carta y Oficio.</p>
                    </div>
                    <div>
                        <button class="btn btn-dark w-100 py-2 border-secondary fw-bold text-info fs-5">140 BS / Copia</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="container text-center my-5">
        <button onclick="window.close();" class="btn btn-cerrar-cyber btn-lg px-5 py-3">
            <i class="bi bi-x-circle-fill me-2"></i>Cerrar esta pestaña
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Robot seguidor en la pestaña de servicios
        const robot = document.getElementById('cyber-avatar');
        let objetivoX = 0, objetivoY = 0;
        let actualX = 0, actualY = 0;
        document.addEventListener('mousemove', (event) => {
            objetivoX = event.clientX + 18;
            objetivoY = event.clientY + 18;
        });
        function suavizarSeguimiento() {
            actualX += (objetivoX - actualX) * 0.08;
            actualY += (objetivoY - actualY) * 0.08;
            robot.style.left = `${actualX}px`;
            robot.style.top = `${actualY}px`;
            requestAnimationFrame(suavizarSeguimiento);
        }
        suavizarSeguimiento();
    </script>
</body>
</html>
